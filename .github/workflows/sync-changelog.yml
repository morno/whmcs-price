name: Sync Changelog to readme.txt

on:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch:

jobs:
  sync-changelog:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync changelog to readme.txt
        run: |
          python3 << 'PYEOF'
          import re
          import sys

          with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
              changelog = f.read()

          with open('readme.txt', 'r', encoding='utf-8') as f:
              readme = f.read()

          # Extract latest version from CHANGELOG.md
          m = re.search(r'^##\s+\[([\d\.]+(?:-[\w\.]+)*)\]', changelog, re.MULTILINE)
          if not m:
              print('Could not determine latest version from CHANGELOG.md')
              sys.exit(1)
          latest_version = m.group(1)
          print(f'Latest version: {latest_version}')

          # Update Stable tag in readme.txt header
          readme = re.sub(
              r'(Stable tag:\s*)[\d\.]+(?:-[\w\.]+)*',
              rf'\g<1>{latest_version}',
              readme
          )

          # Update version badge in README.md
          with open('README.md', 'r', encoding='utf-8') as f:
              readme_md = f.read()
          readme_md_updated = re.sub(
              r'(version-)[\d\.]+(?:-[\w\.]+)*(-brightgreen)',
              rf'\g<1>{latest_version}\2',
              readme_md
          )
          if readme_md_updated != readme_md:
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(readme_md_updated)
              print(f'README.md badge updated to {latest_version}')

          blocks = re.findall(
              r'^(##\s+\[[\d\.]+(?:-[\w\.]+)*\].*?)(?=^##\s+\[|\Z)',
              changelog,
              flags=re.MULTILINE | re.DOTALL
          )

          if not blocks:
              print('No version blocks found in CHANGELOG.md')
              sys.exit(0)

          SECTION_MAP = {
              'Added':      'Added',
              'Changed':    'Changed',
              'Removed':    'Removed',
              'Fixed':      'Fixed',
              'Security':   'Security',
              'Deprecated': 'Deprecated',
          }

          def summarize_block(md_block):
              lines   = md_block.splitlines()
              version = None
              counts  = {'Added': 0, 'Changed': 0, 'Removed': 0, 'Fixed': 0, 'Security': 0}
              current = None

              for line in lines:
                  stripped = line.strip()
                  m = re.match(r'^##\s+\[([\d\.]+(?:-[\w\.]+)*)\]', stripped)
                  if m:
                      version = m.group(1)
                      continue
                  m = re.match(r'^###\s+(\w+)', stripped)
                  if m:
                      current = m.group(1)
                      continue
                  if current and re.match(r'^[-*]\s+\*\*', stripped):
                      if current in counts:
                          counts[current] += 1

              if not version:
                  return None, None

              parts = []
              if counts['Security']:
                  parts.append(f"{counts['Security']} security fix{'es' if counts['Security'] > 1 else ''}")
              if counts['Fixed']:
                  parts.append(f"{counts['Fixed']} bug fix{'es' if counts['Fixed'] > 1 else ''}")
              if counts['Added']:
                  parts.append(f"{counts['Added']} new feature{'s' if counts['Added'] > 1 else ''}")
              if counts['Changed']:
                  parts.append(f"{counts['Changed']} improvement{'s' if counts['Changed'] > 1 else ''}")
              if counts['Removed']:
                  parts.append(f"{counts['Removed']} removal{'s' if counts['Removed'] > 1 else ''}")

              summary = ', '.join(parts) if parts else 'Maintenance update'
              entry   = f'= {version} =\n* {summary.capitalize()}'
              return version, entry

          wp_entries = []
          seen = set()

          for block in blocks:
              version, converted = summarize_block(block)
              if version and version not in seen:
                  wp_entries.append(converted)
                  seen.add(version)

          # Legacy entries predating CHANGELOG.md
          legacy = [
              ('2.1',  '* Refactored for PHP 8.1+ compatibility'),
              ('1.3',  '* Fix Bug'),
              ('1.2',  '* Fix Bug'),
              ('1.1',  '* Fix Interference Bug'),
              ('1.0',  '* First Version'),
          ]
          for v, line in legacy:
              if v not in seen:
                  wp_entries.append(f'= {v} =\n{line}')
                  seen.add(v)

          github_url = 'https://github.com/morno/whmcs-price/blob/main/CHANGELOG.md'
          new_section = (
              '== Changelog ==\n\n'
              + f'For the full changelog, see [CHANGELOG.md]({github_url}).\n\n'
              + '\n\n'.join(wp_entries)
              + '\n\n'
          )

          updated = re.sub(
              r'== Changelog ==.*?(?=^== |\Z)',
              new_section,
              readme,
              flags=re.DOTALL | re.MULTILINE
          )

          if updated == readme:
              print('Already up to date.')
              sys.exit(0)

          with open('readme.txt', 'w', encoding='utf-8') as f:
              f.write(updated)

          print('readme.txt updated successfully.')
          PYEOF

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git diff --quiet readme.txt README.md && echo "No changes to commit." && exit 0

          git add readme.txt README.md
          git commit -m "chore: sync changelog + stable tag to readme.txt [skip ci]"
          git push
